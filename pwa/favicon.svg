<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 外发光 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 内部渐变 -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29ffb8"/>
      <stop offset="100%" stop-color="#1a8f6e"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="46" fill="#111112" stroke="rgba(41,255,184,0.25)" stroke-width="2"/>

  <!-- 外环装饰 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(41,255,184,0.08)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- 中心 C 字母（电台/Claudio 首字母） -->
  <text x="50" y="58" font-family="'Space Mono', 'Courier New', monospace" font-size="42" font-weight="700" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">C</text>

  <!-- 顶部小圆点（Live 指示器风格） -->
  <circle cx="50" cy="22" r="3" fill="#29ffb8" filter="url(#glow)"/>

  <!-- 底部弧线（声波/信号风格） -->
  <path d="M 32 72 Q 50 82 68 72" fill="none" stroke="rgba(41,255,184,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 38 76 Q 50 84 62 76" fill="none" stroke="rgba(41,255,184,0.2)" stroke-width="1" stroke-linecap="round"/>
</svg>